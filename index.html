<!DOCTYPE html>

<body>
    <canvas id="rain-canvas"></canvas>
    <canvas id="waterflower-canvas"></canvas>
    <main>
        <div class="search-card card">
            <form class="search-form" id='search-form'action="https://www.baidu.com/s" method="get" target="_blank">
                <div class="search-engine-selector" onclick=toggleEngineMenu()>
                    <img id="current-engine-icon" src="icons/baidu.svg" alt="Baidu">
                </div>
                <ul id="engine-menu" class="engine-menu">
                    <li onclick="setEngine('baidu')"><img src="icons/baidu.svg">百度</li>
                    <li onclick="setEngine('google')"><img src="icons/google.svg">Google</li>
                    <li onclick="setEngine('bing')"><img src="icons/bing.svg">Bing</li>
                </ul>
        
                <input type="text" class='search-input'id='search-input' name="wd" placeholder="搜点什么？">
                <button type="submit" class="search-btn">搜索</button>
            </form>
        </div>

        <div class = 'card' id="clock">
            <span id="hour">00</span> <span>:</span> <span id="minute">00</span> <span>:</span> <span id="second">00</span>
        </div>

        <div class="card" id="profile">
        <img src="profile.jpg" alt="头像">

            <a href='pong/index.html' target='_blank'>传送门</a>

        </div>

            <h2>联系方式</h2>
            <p>
                电子邮件：
                <span class="email">liuyu999777@gmail.com</span>
                <span class="email">1054795272@qq.com</span>
                <span class="email">2500013521@stu.pku.edu.cn</span>
            </p>
            <p>电话：13376977722</p>
        </div>
            
        <div class="social-links">
            <span class="btn"><img src="icons/qq.svg" onclick="copyToClipboard('1054795272')"></span>
            <a class="btn" href="https://github.com/Liuyu999777" target="_blank" alt="Github"><img src="icons/github.svg">GitHub</a>

            <img src="icons/cd.svg" alt="Record" id="CD"> 
            <audio id="bgm" loop>
                <source src="music.mp3" type="audio/mpeg">
            </audio>
        </div>



    </main>
    <script src="clock.js"></script>
    <script src="copy.js"></script>
